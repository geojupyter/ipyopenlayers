name: Build

on:
  push:
    branches: main
  pull_request:
    branches: '*'

defaults:
  run:
    shell: bash -l {0}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - uses: jupyterlab/maintainer-tools/.github/actions/base-setup@v1
        with:
          python_version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: python -m pip install build jupyterlab==4

      - name: Install JS dependencies
        run: |
          jlpm install
          jlpm run build

      - name: Linting
        run: jlpm run lint:check

      - name: Build Python package
        run: python -m build

      - name: Upload builds
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dist ${{ github.run_number }} ${{ matrix.python-version }}
          path: ./dist

  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - uses: mamba-org/setup-micromamba@v3.0.0
        with:
          environment-file: docs/build-environment.yml

      - name: Build
        run: sphinx-build . output
        working-directory: docs

  visual-regression-tests:
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - uses: jupyterlab/maintainer-tools/.github/actions/base-setup@v1

      - uses: actions/download-artifact@v8.0.1
        with:
          name: dist ${{ github.run_number }} 3.12
          path: ./dist

      - name: Install dependencies
        run: python -m pip install jupyterlab==4

      - name: Install the package
        run: pip install -vv ipyopenlayers*.whl
        working-directory: dist

      - name: Install dependencies
        shell: bash -l {0}
        working-directory: ui-tests
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
        run: jlpm install

      - name: Install browser
        shell: bash -l {0}
        run: npx playwright install chromium
        working-directory: ui-tests

      - name: Execute integration tests
        shell: bash -l {0}
        working-directory: ui-tests
        run: jlpm run test

      - name: Upload Playwright Test report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ipyopenlayers-playwright-tests
          path: |
            ui-tests/test-results
            ui-tests/playwright-report
